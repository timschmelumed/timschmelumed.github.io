<style>
  .panel { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
  .row:last-child { margin-bottom: 0; }
  label { font-size: 13px; color: var(--color-text-secondary); min-width: 110px; }
  .val { font-size: 13px; font-weight: 500; min-width: 64px; text-align: right; color: var(--color-text-primary); }
  .toggle-group { display: flex; gap: 8px; }
  .toggle { font-size: 13px; padding: 5px 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-secondary); cursor: pointer; transition: all 0.15s; }
  .toggle.active { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-primary); font-weight: 500; }
  .play-btn { width: 100%; padding: 10px; font-size: 15px; font-weight: 500; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-primary); cursor: pointer; transition: all 0.15s; }
  .play-btn:hover { background: var(--color-background-tertiary); }
  .play-btn:active { transform: scale(0.98); }
  .section-title { font-size: 12px; font-weight: 500; color: var(--color-text-tertiary); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 12px; }
  .disabled-section { opacity: 0.35; pointer-events: none; }
  .status { font-size: 12px; color: var(--color-text-tertiary); text-align: center; margin-top: 0.5rem; min-height: 18px; }
  .ends { display:flex; justify-content:space-between; font-size:11px; color: var(--color-text-tertiary); padding: 0 0 6px; }
  input[type="range"] { width: 100%; }
</style>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;">Binaural panning tool — adjust frequency, amplitude, duration, ILD and ITD to spatialise a pure tone</h2>

<div style="padding: 1rem 0;">

  <div class="panel">
    <div class="section-title">Tone parameters</div>
    <div class="row">
      <label>Frequency (Hz)</label>
      <input type="range" id="freq" min="0" max="1000" step="1" value="500">
      <span class="val" id="freqVal">1000 Hz</span>
    </div>
    <div class="row">
      <label>Amplitude</label>
      <input type="range" id="amp" min="0" max="1" step="0.01" value="0.5">
      <span class="val" id="ampVal">0.50</span>
    </div>
    <div class="row">
      <label>Duration (ms)</label>
      <input type="range" id="dur" min="1" max="100" step="1" value="50">
      <span class="val" id="durVal">50 ms</span>
    </div>
  </div>

  <div class="panel">
    <div class="section-title">Spatialization</div>
    <div class="toggle-group" style="margin-bottom: 1.25rem;">
      <button class="toggle active" id="btn-ild" onclick="toggleMethod('ild')">ILD</button>
      <button class="toggle active" id="btn-itd" onclick="toggleMethod('itd')">ITD</button>
    </div>

    <div id="ild-section">
      <div class="row">
        <label>ILD (dB)</label>
        <input type="range" id="ild" min="-30" max="30" step="0.5" value="0">
        <span class="val" id="ildVal">0.0 dB</span>
      </div>
      <div class="ends">
        <span>← Left (−30 dB)</span><span>Right (+30 dB) →</span>
      </div>
    </div>

    <div id="itd-section" style="margin-top: 0.5rem;">
      <div class="row">
        <label>ITD (ms)</label>
        <input type="range" id="itd" min="-0.7" max="0.7" step="0.01" value="0">
        <span class="val" id="itdVal">0.00 ms</span>
      </div>
      <div class="ends">
        <span>← Left (−0.7 ms)</span><span>Right (+0.7 ms) →</span>
      </div>
    </div>
  </div>

  <div class="panel" style="text-align:center;">
    <div class="section-title">Head view — perceived position</div>
    <svg id="headsvg" viewBox="0 0 200 120" width="200" height="120" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="100" cy="60" rx="38" ry="48" fill="none" stroke="var(--color-border-secondary)" stroke-width="1.5"/>
      <ellipse cx="63" cy="62" rx="8" ry="14" fill="none" stroke="var(--color-border-secondary)" stroke-width="1.5"/>
      <ellipse cx="137" cy="62" rx="8" ry="14" fill="none" stroke="var(--color-border-secondary)" stroke-width="1.5"/>
      <text x="54" y="66" text-anchor="middle" font-size="9" fill="var(--color-text-tertiary)">L</text>
      <text x="146" y="66" text-anchor="middle" font-size="9" fill="var(--color-text-tertiary)">R</text>
      <circle id="soundDot" cx="100" cy="12" r="7" fill="#378ADD" opacity="0.9"/>
    </svg>
    <div style="font-size:12px; color:var(--color-text-tertiary); margin-top:-4px;" id="posLabel">Center</div>
  </div>

  <button class="play-btn" id="playBtn" onclick="playTone()">Play tone</button>
  <div class="status" id="status"></div>
</div>

<script>
  let useILD = true, useITD = true;
  let audioCtx = null;

  const LOG_MIN = Math.log10(20);
  const LOG_MAX = Math.log10(20000);

  function sliderToFreq(v) {
    return Math.round(Math.pow(10, LOG_MIN + (v / 1000) * (LOG_MAX - LOG_MIN)));
  }

  function freqToSlider(f) {
    return ((Math.log10(f) - LOG_MIN) / (LOG_MAX - LOG_MIN)) * 1000;
  }

  document.getElementById('freq').value = freqToSlider(1000).toFixed(0);

  function formatFreq(v) {
    const f = sliderToFreq(v);
    return f >= 1000 ? (f / 1000).toFixed(f % 1000 === 0 ? 0 : 1) + ' kHz' : f + ' Hz';
  }

  function toggleMethod(m) {
    if (m === 'ild') useILD = !useILD;
    else if (m === 'itd') useITD = !useITD;
    document.getElementById('btn-ild').classList.toggle('active', useILD);
    document.getElementById('btn-itd').classList.toggle('active', useITD);
    document.getElementById('ild-section').classList.toggle('disabled-section', !useILD);
    document.getElementById('itd-section').classList.toggle('disabled-section', !useITD);
    updateDot();
  }

  function bind(id, outId, fmt) {
    const el = document.getElementById(id);
    el.addEventListener('input', () => {
      document.getElementById(outId).textContent = fmt(el.value);
      updateDot();
    });
  }

  bind('freq', 'freqVal', formatFreq);
  bind('amp', 'ampVal', v => parseFloat(v).toFixed(2));
  bind('dur', 'durVal', v => parseInt(v) + ' ms');
  bind('ild', 'ildVal', v => (parseFloat(v) >= 0 ? '+' : '') + parseFloat(v).toFixed(1) + ' dB');
  bind('itd', 'itdVal', v => (parseFloat(v) >= 0 ? '+' : '') + parseFloat(v).toFixed(2) + ' ms');

  document.getElementById('freqVal').textContent = formatFreq(document.getElementById('freq').value);

  function updateDot() {
    const ild = useILD ? parseFloat(document.getElementById('ild').value) : 0;
    const itd = useITD ? parseFloat(document.getElementById('itd').value) : 0;
    const combined = (ild / 30) * 0.6 + (itd / 0.7) * 0.4;
    const clamped = Math.max(-1, Math.min(1, combined));
    const angle = clamped * Math.PI * 0.55;
    const r = 56;
    const cx = 100 + Math.sin(angle) * r;
    const cy = 12 + (1 - Math.cos(angle)) * 50;
    document.getElementById('soundDot').setAttribute('cx', cx.toFixed(1));
    document.getElementById('soundDot').setAttribute('cy', cy.toFixed(1));
    document.getElementById('posLabel').textContent =
      clamped < -0.03 ? `Left ${Math.round(-clamped * 100)}%` :
      clamped > 0.03  ? `Right ${Math.round(clamped * 100)}%` : 'Center';
  }

  async function playTone() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    const freq = sliderToFreq(document.getElementById('freq').value);
    const amp = parseFloat(document.getElementById('amp').value);
    const durMs = parseInt(document.getElementById('dur').value);
    const ildDb = useILD ? parseFloat(document.getElementById('ild').value) : 0;
    const itdMs = useITD ? parseFloat(document.getElementById('itd').value) : 0;
    const durS = durMs / 1000;
    const itdS = itdMs / 1000;

    const leftGain  = ildDb <= 0 ? 1 : Math.pow(10, -ildDb / 20);
    const rightGain = ildDb >= 0 ? 1 : Math.pow(10,  ildDb / 20);

    const merger = audioCtx.createChannelMerger(2);
    merger.connect(audioCtx.destination);

    function makeChannel(gainVal, delayVal, chanIdx) {
      const osc = audioCtx.createOscillator();
      const gn = audioCtx.createGain();
      const dl = audioCtx.createDelay(1.0);
      const env = audioCtx.createGain();

      osc.type = 'sine';
      osc.frequency.value = freq;
      gn.gain.value = gainVal * amp;
      dl.delayTime.value = Math.max(0, delayVal);

      const now = audioCtx.currentTime + Math.max(0, -delayVal);
      env.gain.setValueAtTime(0, now);
      env.gain.linearRampToValueAtTime(1, now + Math.min(0.003, durS * 0.1));
      env.gain.setValueAtTime(1, now + durS - Math.min(0.003, durS * 0.1));
      env.gain.linearRampToValueAtTime(0, now + durS);

      osc.connect(gn); gn.connect(dl); dl.connect(env);
      env.connect(merger, 0, chanIdx);

      osc.start(now);
      osc.stop(now + durS + 0.01);
    }

    makeChannel(leftGain,  itdS < 0 ? -itdS : 0, 0);
    makeChannel(rightGain, itdS > 0 ?  itdS : 0, 1);

    const btn = document.getElementById('playBtn');
    const ildStr = useILD ? `ILD ${ildDb >= 0 ? '+' : ''}${ildDb.toFixed(1)} dB` : 'ILD off';
    const itdStr = useITD ? `ITD ${itdMs >= 0 ? '+' : ''}${itdMs.toFixed(2)} ms` : 'ITD off';
    document.getElementById('status').textContent = `${formatFreq(document.getElementById('freq').value)} · ${durMs} ms · ${ildStr} · ${itdStr}`;
    btn.textContent = 'Playing…';
    btn.style.opacity = '0.6';
    setTimeout(() => { btn.textContent = 'Play tone'; btn.style.opacity = '1'; }, durMs + 30);
  }

  updateDot();
</script>

</body></html>
